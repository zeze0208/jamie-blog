name: Sync from Notion

on:
  workflow_dispatch: # 수동 실행 (GitHub Actions 탭에서 버튼 클릭)
  schedule:
    - cron: '0 * * * *' # 매시간 자동 실행

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sync dependencies
        run: npm install @notionhq/client notion-to-md

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/sync-notion.js

      - name: Commit and push synced posts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add content/
          git diff --staged --quiet && echo "변경사항 없음" || (git commit -m "chore: sync posts from Notion" && git push)
